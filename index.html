<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakingo - Online Cake Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">bakingo</div>
        <div class="search-container">
            <input type="text" placeholder="🔍 Search For Cakes, Occasion, Flavour And More...">
        </div>
        <div class="header-links">
            <span onclick="showAlert('Track Order')">📍 Track Order</span>
            <span onclick="showAlert('Cart')">🛒 Cart</span>
            <span onclick="showAlert('Login')">👤 Login/Signup</span>
        </div>
    </header>

    <!-- Navigation -->
    <nav>
        <a onclick="showAlert('Cakes')">Cakes</a>
        <a onclick="showAlert('Theme Cakes')">Theme Cakes</a>
        <a onclick="showAlert('By Relationship')">By Relationship</a>
        <a onclick="showAlert('Desserts')">Desserts</a>
        <a onclick="showAlert('Birthday')">Birthday</a>
        <a onclick="showAlert('Hampers')">Hampers <span class="new-badge">NEW</span></a>
        <a onclick="showAlert('Anniversary')">Anniversary</a>
        <a onclick="showAlert('Occasions')">Occasions</a>
        <a onclick="showAlert('Customized')">Customized Cakes</a>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Floating Decorations -->
        <div class="strawberry strawberry1">🍓</div>
        <div class="strawberry strawberry2">🍓</div>
        <div class="strawberry strawberry3">🍓</div>
        <div class="star">✨</div>

        <!-- Cakes Display -->
        <div class="cakes-display">
            <div class="cake-item cake-1" onclick="selectCake('Chocolate Cake')">
                <div class="cake-image">🍰</div>
            </div>
            <div class="cake-item cake-2" onclick="selectCake('Strawberry Cheese')">
                <div class="cake-image">🎂</div>
            </div>
            <div class="cake-item cake-3" onclick="selectCake('Berry Cake')">
                <div class="cake-image">🍰</div>
            </div>
            <div class="cake-item cake-4" onclick="selectCake('Chocolate Cake')">
                <div class="cake-image">🎂</div>
            </div>
            <div class="cake-item cake-5" onclick="selectCake('Red Velvet')">
                <div class="cake-image">🍰</div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <h1>VERY BERRY STRAWBERRY</h1>
            <p>COLLECTION</p>
            <button class="order-btn" onclick="orderNow()">Order Now</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
