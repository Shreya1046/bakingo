<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakingo - Online Cake Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="footer.css">
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo"><i>bakingo</i></div>
            <div class="delivering-to">
                <span class="loc-icon">📍</span> Delivering To <span class="chevron">▼</span>
            </div>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <input type="text" placeholder="Search For Cakes, Occasion, Flavour And More...">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div class="header-links">
            <div class="link-item">
                <div class="icon">％</div>
                <span>Track Order</span>
            </div>
            <div class="link-item">
                <div class="icon">🛒</div>
                <span>Cart</span>
            </div>
            <div class="link-item">
                <div class="icon">👤</div>
                <span>Login/Signup</span>
            </div>
        </div>
    </header>

    <nav id="main-nav">
        <!-- Loaded from nav.html via script -->
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <div class="carousel">
            <div class="carousel-inner">
                <div class="carousel-item">
                    <img src="assests/home1.png" alt="Slide 1">
                    <button class="home_button" onclick="orderNow()">Order Now</button>
                </div>
                <div class="carousel-item">
                    <img src="assests/Gemini_Generated_Image_twpj44twpj44twpj.png" alt="Slide 2">
                    <button class="home_button" onclick="orderNow()">Order Now</button>
                </div>
                <div class="carousel-item">
                    <img src="assests/home3.png" alt="Slide 3">
                    <button class="home_button" onclick="orderNow()">Order Now</button>
                </div>
                <div class="carousel-item">
                    <img src="assests/home4.png" alt="Slide 4">
                    <button class="home_button" onclick="orderNow()">Order Now</button>
                </div>
                <div class="carousel-item">
                    <img src="assests/home5.png" alt="Slide 5">
                    <button class="home_button" onclick="orderNow()">Order Now</button>
                </div>
            </div>
            <button class="carousel-arrow left-arrow" onclick="prevSlide()">‹</button>
            <button class="carousel-arrow right-arrow" onclick="nextSlide()">›</button>
            <div class="carousel-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </div>

    <!-- Menu Section -->
    <section class="landing-menu">
        <div class="menu-heading">
            <h2>Menu</h2>
            <p>What will you wish for?</p>
        </div>
        <div class="menu-grid">
            <a href="category.html?category=chocolate-cakes" class="menu-card">
                <img src="assests/classic_cake.png" alt="Classic Cakes">
                <span>CLASSIC</span>
            </a>
            <a href="category.html?category=gourmet-cakes" class="menu-card">
                <img src="assests/gourmet_cake.png" alt="Gourmet Cakes">
                <span>GOURMET</span>
            </a>
            <a href="category.html?category=all-designer-cakes" class="menu-card">
                <img src="assests/designer_cake.png" alt="Designer Cakes">
                <span>DESIGNER</span>
            </a>
            <a href="category.html?category=photo-cakes" class="menu-card">
                <img src="assests/photo_cake.png" alt="Photo Cakes">
                <span>PHOTO CAKES</span>
            </a>
            <a href="category.html?category=all-desserts" class="menu-card">
                <img src="assests/desserts_jar.png" alt="Desserts">
                <span>DESSERTS</span>
            </a>
            <a href="category.html?category=gift-hampers" class="menu-card">
                <img src="assests/hampers_box.png" alt="Hampers">
                <span>HAMPERS</span>
            </a>
        </div>
    </section>

    <footer id="main-footer">
        <!-- Loaded from footer.html via script -->
    </footer>

    <script src="script.js"></script>
</body>
</html>
