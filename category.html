<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category - Bakingo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="category.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-left">
                <div class="logo">
                    <img src="https://www.bakingo.com/static/media/logo.8d2146f3.svg" alt="Bakingo" id="bakingo-logo">
                </div>
                <div class="delivering-to">
                    <span class="loc-icon">📍</span> Delivering To <span class="chevron">▼</span>
                </div>
            </div>

            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search For Cakes, Occasion, Flavour And More...">
            </div>

            <div class="header-right">
                <div class="header-icon-item">
                    <div class="icon-img">%</div>
                    <span class="label">Track Order</span>
                </div>
                <div class="header-icon-item">
                    <div class="icon-img">🛒</div>
                    <span class="label">Cart</span>
                </div>
                <div class="header-icon-item">
                    <div class="icon-img">👤</div>
                    <span class="label">Login/Signup</span>
                </div>
            </div>
        </div>
    </header>

    <nav id="main-nav">
        <!-- Loaded from nav.html via script -->
    </nav>

    <main class="category-page">
        <!-- Category Title -->
        <h1 class="category-title" id="category-title">Cricket Cakes</h1>

        <!-- Sort/Filter Bar -->
        <div class="category-toolbar">
            <button class="sort-btn" id="sort-trigger">
                Sort ↓↑
            </button>
            
            <div class="sort-dropdown" id="sort-dropdown" style="display:none;">
                <div class="sort-option" data-value="relevance">Relevance</div>
                <div class="sort-option" data-value="price-low">Price: Low to High</div>
                <div class="sort-option" data-value="price-high">Price: High to Low</div>
                <div class="sort-option" data-value="rating">Rating</div>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">
            <!-- Products will be injected here by category.js -->
        </div>

        <!-- No Products Message -->
        <div class="no-products" id="no-products" style="display:none;">
            <div class="no-products-icon">🎂</div>
            <h2>No products found</h2>
            <p>We couldn't find any products in this category. Try browsing our other delicious options!</p>
            <a href="index.html" class="back-home-btn">Back to Home</a>
        </div>
    </main>

    <footer id="main-footer">
        <!-- Loaded from footer.html via script -->
    </footer>

    <script src="data/products.js"></script>
    <script src="category.js"></script>
    <script src="script.js"></script>
</body>
</html>
